<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#05030f" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='50%25' r='50%25'%3E%3Cstop offset='30%25' stop-color='%23000'/%3E%3Cstop offset='55%25' stop-color='%236c3fd6'/%3E%3Cstop offset='75%25' stop-color='%2354e6ff'/%3E%3Cstop offset='100%25' stop-color='%2305030f'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='64' height='64' fill='%2305030f'/%3E%3Ccircle cx='32' cy='32' r='26' fill='url(%23g)'/%3E%3Ccircle cx='32' cy='32' r='12' fill='%23000'/%3E%3C/svg%3E"
    />
    <meta
      name="description"
      content="Event Horizon: Eat the Universe — become a living singularity, devour matter, collapse stars and consume reality itself."
    />
    <title>Event Horizon: Eat the Universe</title>

    <!--
      CrazyGames SDK (v3). Loaded best-effort: the game runs fully without it
      (Basic Launch does not require the SDK). The wrapper in src/sdk detects
      availability and fires the GameplayStart event when the player can play.
    -->
    <script
      src="https://sdk.crazygames.com/crazygames-sdk-v3.js"
      onerror="window.__cgSdkFailed = true;"
    ></script>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>
      <div id="ui-root"></div>
      <div id="boot-screen">
        <div class="boot-core"></div>
        <div class="boot-title">EVENT HORIZON</div>
        <div class="boot-sub">EAT THE UNIVERSE</div>
        <div class="boot-bar"><div class="boot-bar-fill"></div></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
